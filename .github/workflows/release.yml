# TapTable release: on a v* tag push, stamp module.json with the tag version and a
# tag-pinned download URL, zip the module, and attach BOTH module.zip and the
# rewritten module.json to the GitHub release. "manifest" stays pointed at
# releases/latest/download/module.json so Foundry always installs the newest release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the annotated tag object to read its message

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp module.json (version + tag-pinned download URL)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg ver "$VERSION" \
             --arg dl "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/module.zip" \
             '.version = $ver | .download = $dl' \
             module.json > module.json.tmp
          mv module.json.tmp module.json
          jq -e . module.json > /dev/null

      - name: Build module.zip
        run: |
          zip -r module.zip \
            module.json LICENSE NOTICE README.md ADAPTERS.md \
            scripts/ adapters/ styles/ lang/ \
            -x "*.git*"

      - name: Create release and attach assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "TapTable $GITHUB_REF_NAME" \
            --generate-notes \
            module.zip module.json

      # Announcements are OPT-IN: only tags whose annotation message contains the
      # literal marker [announce] post to Discord. A plain tag ships silently.
      #   silent : git tag -a v1.0.1 -m "minor i18n fixes"
      #   announce: git tag -a v1.1.0 -m "combat carousel [announce]"
      - name: Announce in Discord (Harvog's Tavern)
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "no webhook secret; skipping announce"; exit 0; fi
          MSG=$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')
          if ! printf '%s' "$MSG" | grep -qF '[announce]'; then
            echo "tag has no [announce] marker; shipping silently"; exit 0
          fi
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"🍺 **TapTable ${GITHUB_REF_NAME}** is out! Update from Foundry's module manager, or read the notes: <https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}>\"}" \
            "$WEBHOOK" || echo "announce failed (non-fatal)"
